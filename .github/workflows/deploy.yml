name: Build & deploy calendar page

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"   # hourly (UTC); GitHub may delay scheduled runs
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate page
        env:
          GCAL_CREDENTIALS: ${{ secrets.GCAL_CREDENTIALS }}
          CALENDAR_ID: ${{ vars.CALENDAR_ID }}
        run: python generate.py

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
