<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIM Maintenance Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gim-green: #7ac142;
      --gim-black: #111111;
      --gim-white: #ffffff;
      --card: #1c1c1c;
      --muted: #9a9a9a;
      --gim-tan: #c9b79c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Copperplate Gothic Light", "Copperplate", "Copperplate Gothic", Georgia, serif;
      background: var(--gim-black);
      color: var(--gim-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: var(--gim-black);
      border-bottom: 4px solid var(--gim-green);
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      font-family: "Alfa Slab One", cursive;
      color: var(--gim-green);
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: 1px;
    }
    header p {
      margin-top: 0.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.85rem;
      opacity: 0.85;
    }
    main {
      width: 100%;
      max-width: 1180px;
      flex: 1;
      padding: 2rem 1rem 3rem;
    }
    /* ---- calendar grid ---- */
    .cal-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .cal-grid {
      display: grid;
      grid-template-columns: 0.6fr 1fr 1fr 1fr 1fr 1fr 0.6fr;
      gap: 4px;
      min-width: 760px; /* keeps weekdays usable; scrolls on small screens */
    }
    .cal-head {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gim-green);
      padding: 0.35rem 0 0.5rem;
    }
    .cal-head.weekend { color: var(--muted); }
    .cal-cell {
      background: var(--card);
      border-radius: 5px;
      min-height: 110px;
      padding: 0.3rem 0.35rem;
      border: 1px solid transparent;
    }
    .cal-cell.weekend { background: #161616; }
    .cal-cell.past { opacity: 0.5; }
    .cal-cell.today {
      border-color: var(--gim-green);
      box-shadow: inset 0 0 0 1px var(--gim-green);
    }
    .cal-daynum { font-size: 0.7rem; color: var(--muted); margin-bottom: 0.25rem; }
    .cal-cell.today .cal-daynum { color: var(--gim-green); font-weight: bold; }
    .chip {
      display: block;
      font-size: 0.66rem;
      line-height: 1.25;
      border-radius: 3px;
      padding: 2px 5px;
      margin-bottom: 3px;
    }
    .chip.maintenance { background: rgba(122, 193, 66, 0.2); border-left: 2px solid var(--gim-green); }
    .chip.holiday { background: rgba(201, 183, 156, 0.22); border-left: 2px solid var(--gim-tan); }
    .chip-time {
      display: block;
      font-size: 0.6rem;
      color: var(--gim-green);
      font-variant-numeric: tabular-nums;
    }
    .chip.holiday .chip-time { color: var(--gim-tan); }
    .chip-title { display: block; font-weight: bold; color: #f0f0f0; }
    .chip-loc { display: block; font-size: 0.58rem; color: var(--muted); }
    footer {
      width: 100%;
      text-align: center;
      padding: 1.25rem 1rem;
      font-size: 0.72rem;
      letter-spacing: 1px;
      color: var(--gim-white);
      opacity: 0.55;
      border-top: 1px solid rgba(122, 193, 66, 0.4);
    }
  </style>
</head>
<body>
  <header>
    <h1>GIM Maintenance Schedule</h1>
    <p>{{RANGE}}</p>
  </header>
  <main>
    {{GRID}}
  </main>
  <footer>
    &copy; GIM &mdash; All times Eastern (America/New_York) &middot; Last updated {{UPDATED}}
  </footer>
</body>
</html>
